name: Auto-Sync LLM Pricing Data

on:
  schedule:
    - cron: "0 6 * * *"  # Every day at 6:00 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  sync-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Fetch latest pricing data
        run: |
          curl -sL "https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json" \
            -o src/llmprice/data/model_prices.json

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/llmprice/data/model_prices.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Set date-based version
        if: steps.diff.outputs.changed == 'true'
        run: |
          VERSION=$(date -u +"%Y.%-m.%-d")
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Commit and tag
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/llmprice/data/model_prices.json pyproject.toml
          git commit -m "sync: update pricing data ${VERSION}"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Build package
        if: steps.diff.outputs.changed == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.diff.outputs.changed == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
