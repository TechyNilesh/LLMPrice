name: Auto-Sync LLM Pricing Data

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 6:00 AM UTC — sync data to repo
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish to PyPI"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Fetch latest pricing data
        run: |
          curl -sL "https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json" \
            -o src/llmprice/data/model_prices.json

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/llmprice/data/model_prices.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit data update
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/llmprice/data/model_prices.json
          git commit -m "sync: update pricing data $(date -u +%Y-%m-%d)"
          git push origin main

      # Publish to PyPI only on Mondays OR manual force
      - name: Check if publish day
        id: publish
        run: |
          DAY=$(date -u +%u)  # 1=Monday
          FORCE="${{ inputs.force_publish }}"
          if [ "$DAY" = "1" ] || [ "$FORCE" = "true" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set weekly version
        if: steps.publish.outputs.should_publish == 'true' && steps.diff.outputs.changed == 'true'
        run: |
          VERSION=$(date -u +"%Y.%-m.%-d")
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          git add pyproject.toml
          git commit -m "release: v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Build and publish
        if: steps.publish.outputs.should_publish == 'true' && steps.diff.outputs.changed == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv build
          uv publish
