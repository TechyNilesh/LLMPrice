name: Auto-Sync LLM Pricing Data

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 6:00 AM UTC — sync data to repo
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish to PyPI and npm"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest pricing data
        run: |
          curl -sL "https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json" \
            -o data/model_prices.json

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/model_prices.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Copy data to packages
        if: steps.diff.outputs.changed == 'true'
        run: |
          cp data/model_prices.json python/src/llmprice/data/model_prices.json
          cp data/model_prices.json typescript/data/model_prices.json

      - name: Commit data update
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ python/src/llmprice/data/ typescript/data/
          git commit -m "sync: update pricing data $(date -u +%Y-%m-%d)"
          git push origin main

      # Publish only on Mondays OR manual force
      - name: Check if publish day
        id: publish
        run: |
          DAY=$(date -u +%u)
          FORCE="${{ inputs.force_publish }}"
          if [ "$DAY" = "1" ] || [ "$FORCE" = "true" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set weekly version
        if: steps.publish.outputs.should_publish == 'true' && steps.diff.outputs.changed == 'true'
        run: |
          VERSION=$(date -u +"%Y.%-m.%-d")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

          # Update Python version
          sed -i "s/^version = .*/version = \"${VERSION}\"/" python/pyproject.toml

          # Update TypeScript version
          cd typescript && npm version "${VERSION}" --no-git-tag-version && cd ..

          git add python/pyproject.toml typescript/package.json
          git commit -m "release: v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --tags

      # Publish Python
      - name: Install uv
        if: steps.publish.outputs.should_publish == 'true' && steps.diff.outputs.changed == 'true'
        uses: astral-sh/setup-uv@v4

      - name: Build and publish Python
        if: steps.publish.outputs.should_publish == 'true' && steps.diff.outputs.changed == 'true'
        working-directory: python
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv build
          uv publish

      # Publish TypeScript
      - name: Setup Node.js
        if: steps.publish.outputs.should_publish == 'true' && steps.diff.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Build and publish TypeScript
        if: steps.publish.outputs.should_publish == 'true' && steps.diff.outputs.changed == 'true'
        working-directory: typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm install
          npm run build
          npm publish
